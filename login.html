<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to U.N.D Industries.">
  <meta name="robots" content="noindex, nofollow">
  <title>Login — U.N.D Industries</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="und-body" data-page="login" data-auth-page="true">

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">U.N.D <span>Industries</span></div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to access your dashboard.</p>

      <div id="login-alert" class="auth-alert" role="alert"></div>

      <form id="login-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email" name="email"
            placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" name="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
          Sign In
        </button>
      </form>

      <p class="auth-footer-text">
        Don't have an account? <a href="register.html">Register</a>
      </p>
      <p class="auth-footer-text" style="margin-top:8px;">
        <a href="index.html" style="color:var(--text-muted);">← Back to site</a>
      </p>
    </div>
  </div>

  <script src="assets/main.js"></script>
</body>
</html>
