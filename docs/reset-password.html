<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — U.N.D Industries</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body data-page="reset-password">
  <div class="auth-page">
    <div class="auth-box">
      <a href="index.html" class="auth-logo">U.N.D <span>Industries</span></a>
      <div id="auth-status-banner"></div>

      <!-- REQUEST MODE: default view — request a reset email -->
      <div id="reset-request-wrap">
        <h1 class="auth-title">Reset password</h1>
        <p class="auth-sub">Enter your account email. We'll send a reset link.</p>
        <div id="reset-alert" class="auth-alert" role="alert"></div>
        <form id="reset-form" class="form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reset-email">Email</label>
            <input class="form-input" type="email" id="reset-email" placeholder="your@email.com" required autocomplete="email">
          </div>
          <div class="cf-turnstile mt-8" data-sitekey="0x4AAAAAADaGp_-rFwn39q-z" data-theme="dark"></div>
          <button type="submit" class="btn btn-primary btn-full mt-8">Send Reset Link</button>
        </form>
        <p class="auth-switch mt-16"><a href="login.html">Back to Sign In</a></p>
        <p class="auth-footer-text mt-8"><a href="index.html" class="auth-link-muted">&#8592; Back to site</a></p>
      </div>

      <!-- SET MODE: shown when URL hash contains type=recovery -->
      <div id="reset-set-wrap" hidden>
        <h1 class="auth-title">Set new password</h1>
        <p class="auth-sub">Choose a strong password for your account.</p>
        <div id="set-password-alert" class="auth-alert" role="alert"></div>
        <form id="set-password-form" class="form" novalidate>
          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <input class="form-input" type="password" id="new-password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-new-password">Confirm Password</label>
            <input class="form-input" type="password" id="confirm-new-password" placeholder="Repeat your new password" minlength="8" required autocomplete="new-password">
          </div>
          <button type="submit" id="set-password-submit" class="btn btn-primary btn-full mt-8">Set Password</button>
        </form>
        <p class="auth-switch mt-16"><a href="login.html">Back to Sign In</a></p>
      </div>

    </div>
  </div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
