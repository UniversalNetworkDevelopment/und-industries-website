<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — U.N.D Industries</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="reset-password">
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">U.N.D <span>Industries</span></div>
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-sub">Enter your account email. We'll send a reset link.</p>
      <div class="auth-offline-banner" role="alert" aria-live="polite">
        <strong>Authentication is currently offline.</strong> Password reset activates once the backend is connected. Email <a href="mailto:officialtyzen@gmail.com" style="color:var(--warning);">officialtyzen@gmail.com</a> for account help.
      </div>
      <div id="reset-alert" class="auth-alert" role="alert"></div>
      <form id="reset-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email</label>
          <input class="form-input" type="email" id="reset-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Send Reset Link</button>
      </form>
      <p class="auth-switch" style="margin-top:16px;"><a href="login.html">Back to Sign In</a></p>
      <p class="auth-footer-text" style="margin-top:8px;"><a href="index.html" style="color:var(--text-muted);">← Back to site</a></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
