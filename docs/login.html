<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
  <title>Sign In — U.N.D Industries</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body data-page="login" data-auth-page="true">
  <div class="auth-page">
    <div class="auth-box">
      <a href="index.html" class="auth-logo">U.N.D <span>Industries</span></a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to access your dashboard.</p>
      <div id="auth-status-banner"></div>
      <div id="login-alert" class="auth-alert" role="alert"></div>
      <form id="login-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="cf-turnstile mt-8" data-sitekey="0x4AAAAAADaGp_-rFwn39q-z" data-theme="dark"></div>
        <button type="submit" class="btn btn-primary btn-full mt-8">Sign In</button>
      </form>
      <p class="auth-switch mt-12"><a href="reset-password.html" class="auth-link-muted">Forgot password?</a></p>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a>.</p>
      <p class="auth-footer-text mt-8"><a href="index.html" class="auth-link-muted">← Back to site</a></p>
      <p class="auth-footer-text auth-footer-legal"><a href="privacy.html" class="auth-link-muted">Privacy Policy</a> &middot; <a href="terms.html" class="auth-link-muted">Terms of Use</a></p>
    </div>
  </div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
