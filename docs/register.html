<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; frame-ancestors *;">
  <title>Create Account — U.N.D Industries</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=1781536538126">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body data-page="register" data-auth-page="true">
  <div class="auth-page">
    <div class="auth-box">
      <a href="index.html" class="auth-logo">U.N.D <span>Industries</span></a>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Set up your U.N.D Industries access.</p>
      <div id="auth-status-banner"></div>
      <div id="reg-alert" class="auth-alert" role="alert"></div>
      <form id="register-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="Your name" required maxlength="120" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <div class="auth-terms-check">
          <label>
            <input type="checkbox" id="agree-terms" required>
            I confirm I am <strong>18 years of age or older</strong>, and I have read and agree to the <a href="terms.html" target="_blank" rel="noopener">Terms of Use</a>, <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>, and <a href="refund.html" target="_blank" rel="noopener">Refund Policy</a> of Universal Network Development LLC (U.N.D Industries). All sales are final.
          </label>
        </div>
        <div class="cf-turnstile mt-8" data-sitekey="0x4AAAAAADaGp_-rFwn39q-z" data-theme="dark"></div>
        <button type="submit" class="btn btn-primary btn-full mt-8">Create Account</button>
      </form>
      
      <div style="display:flex; align-items:center; margin: 24px 0;">
        <hr style="flex:1; border:none; border-top:1px solid #2c2c36;">
        <span style="padding:0 12px; color:#8a909e; font-size:12px; font-weight:600;">OR</span>
        <hr style="flex:1; border:none; border-top:1px solid #2c2c36;">
      </div>
      <button type="button" id="btn-google-register" class="btn btn-outline btn-full" style="display:flex; justify-content:center; align-items:center; gap:10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <p class="auth-switch mt-12">Already have an account? <a href="login.html">Log in</a>.</p>
      <p class="auth-footer-text mt-8"><a href="index.html" class="auth-link-muted">← Back to site</a></p>
      <p class="auth-footer-text auth-footer-legal"><a href="privacy.html" class="auth-link-muted">Privacy Policy</a> &middot; <a href="terms.html" class="auth-link-muted">Terms of Use</a></p>
    </div>
  </div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
