<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Register — U.N.D Industries</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="register" data-auth-page="true">
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">U.N.D <span>Industries</span></div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Set up your U.N.D Industries access.</p>
      <div id="reg-alert" class="auth-alert" role="alert"></div>
      <form id="register-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="Your name" required maxlength="120" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
      </form>
      <p class="auth-footer-text">Already have an account? <a href="login.html">Sign in</a></p>
      <p class="auth-footer-text" style="margin-top:8px;"><a href="index.html" style="color:var(--text-muted);">← Back to site</a></p>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
